{% extends "base.html" %}
{% block title %}Login — OptiCrop{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="glass-card auth-card" data-aos="fade-up">
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="OptiCrop">
      <h2>Welcome Back</h2>
      <p>Sign in to access your dashboard and prediction history</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="you@farm.com" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-gold w-100 btn-ripple">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p class="text-center mb-0 text-muted-custom">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}
