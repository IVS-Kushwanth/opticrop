{% extends "base.html" %}
{% block title %}Register — OptiCrop{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="glass-card auth-card" data-aos="fade-up">
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="OptiCrop">
      <h2>Create Account</h2>
      <p>Join OptiCrop and start making smarter crop decisions</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="John Farmer" required autofocus>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="you@farm.com" required>
      </div>
      <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <select class="form-select" id="role" name="role">
          <option value="farmer" selected>Farmer</option>
          <option value="researcher">Researcher</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Min. 6 characters" required minlength="6">
      </div>
      <div class="mb-3">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-gold w-100 btn-ripple">
        <i class="fas fa-user-plus me-2"></i>Create Account
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p class="text-center mb-0 text-muted-custom">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
